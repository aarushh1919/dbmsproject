<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="card">
  <h1 class="card-title">Create Account</h1>
  <p class="card-subtitle">Fill in your details to get started</p>

  <div class="alert error" id="alertBox"></div>
  <div class="alert success" id="successBox"></div>

  <div class="form-grid">
    <div class="field">
      <label>First Name</label>
      <input type="text" id="firstName" placeholder="John" />
    </div>
    <div class="field">
      <label>Last Name</label>
      <input type="text" id="lastName" placeholder="Doe" />
    </div>
    <div class="field full">
      <label>Username</label>
      <input type="text" id="username" placeholder="johndoe99" />
    </div>
    <div class="field full">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="john@example.com" />
    </div>
    <div class="field full">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+91 98765 43210" />
    </div>
    <div class="field">
      <label>Gender</label>
      <select id="gender">
        <option value="">Select</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="other">Other</option>
        <option value="prefer_not_to_say">Prefer not to say</option>
      </select>
    </div>
    <div class="field">
      <label>Date of Birth</label>
      <input type="date" id="dob" />
    </div>
    <div class="field full">
      <label>Street Address</label>
      <input type="text" id="street" placeholder="123 Main St" />
    </div>
    <div class="field">
      <label>City</label>
      <input type="text" id="city" placeholder="Ludhiana" />
    </div>
    <div class="field">
      <label>State</label>
      <input type="text" id="state" placeholder="Punjab" />
    </div>
    <div class="field">
      <label>Country</label>
      <input type="text" id="country" placeholder="India" />
    </div>
    <div class="field">
      <label>ZIP Code</label>
      <input type="text" id="zip" placeholder="141001" />
    </div>
    <div class="field full">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Min. 6 characters" />
        <button class="toggle-pw" onclick="togglePw('password', this)">👁</button>
      </div>
    </div>
    <div class="field full">
      <label>Confirm Password</label>
      <div class="password-wrap">
        <input type="password" id="confirmPassword" placeholder="Re-enter password" />
        <button class="toggle-pw" onclick="togglePw('confirmPassword', this)">👁</button>
      </div>
    </div>
  </div>

  <button class="btn" id="registerBtn" onclick="register()">Create Account</button>

  <p class="switch-link">Already have an account? <a href="index.html">Sign in</a></p>
</div>

<script>
  const API = 'http://localhost:5000/api/auth';

  function togglePw(id, btn) {
    const el = document.getElementById(id);
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
  }

  function showAlert(type, msg) {
    const box = type === 'error' ? document.getElementById('alertBox') : document.getElementById('successBox');
    const other = type === 'error' ? document.getElementById('successBox') : document.getElementById('alertBox');
    other.classList.remove('show');
    box.textContent = msg;
    box.classList.add('show');
  }

  async function register() {
    const btn = document.getElementById('registerBtn');
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (password !== confirm) return showAlert('error', 'Passwords do not match.');

    const payload = {
      firstName: document.getElementById('firstName').value.trim(),
      lastName: document.getElementById('lastName').value.trim(),
      username: document.getElementById('username').value.trim(),
      email: document.getElementById('email').value.trim(),
      phone: document.getElementById('phone').value.trim(),
      gender: document.getElementById('gender').value,
      dateOfBirth: document.getElementById('dob').value,
      password,
      address: {
        street: document.getElementById('street').value.trim(),
        city: document.getElementById('city').value.trim(),
        state: document.getElementById('state').value.trim(),
        country: document.getElementById('country').value.trim(),
        zipCode: document.getElementById('zip').value.trim(),
      }
    };

    if (!payload.firstName || !payload.lastName || !payload.username || !payload.email || !payload.phone || !payload.password) {
      return showAlert('error', 'Please fill in all required fields.');
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const res = await fetch(`${API}/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        showAlert('success', 'Account created! Redirecting...');
        setTimeout(() => window.location.href = 'index.html', 1200);
      } else {
        showAlert('error', data.message || 'Registration failed.');
      }
    } catch (e) {
      showAlert('error', 'Cannot connect to server.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
