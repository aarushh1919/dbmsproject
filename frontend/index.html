<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="card">
  <h1 class="card-title">Welcome Back</h1>
  <p class="card-subtitle">Sign in to your account</p>

  <div class="alert error" id="alertBox"></div>

  <div style="display:flex; flex-direction:column; gap:1rem;">
    <div class="field">
      <label>Email or Username</label>
      <input type="text" id="emailOrUsername" placeholder="john@example.com or johndoe99" />
    </div>
    <div class="field">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="password" placeholder="Your password" />
        <button class="toggle-pw" onclick="togglePw()">👁</button>
      </div>
    </div>
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Sign In</button>

  <div class="divider">or</div>

  <p class="switch-link">Don't have an account? <a href="register.html">Register</a></p>
</div>

<script>
  const API = 'http://localhost:5000/api/auth';

  function togglePw() {
    const el = document.getElementById('password');
    const btn = document.querySelector('.toggle-pw');
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '👁' : '🙈';
  }

  function showAlert(msg) {
    const box = document.getElementById('alertBox');
    box.textContent = msg;
    box.classList.add('show');
  }

  async function login() {
    const btn = document.getElementById('loginBtn');
    const emailOrUsername = document.getElementById('emailOrUsername').value.trim();
    const password = document.getElementById('password').value;

    if (!emailOrUsername || !password) return showAlert('Please fill in all fields.');

    btn.disabled = true;
    btn.textContent = 'Signing in...';

    try {
      const res = await fetch(`${API}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ emailOrUsername, password })
      });
      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        window.location.href = 'dashboard.html';
      } else {
        showAlert(data.message || 'Login failed.');
      }
    } catch (e) {
      showAlert('Cannot connect to server.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }
</script>
</body>
</html>
